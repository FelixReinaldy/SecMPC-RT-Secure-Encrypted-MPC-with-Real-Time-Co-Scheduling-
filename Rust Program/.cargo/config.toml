# ── Konfigurasi Build untuk ESP32-S3 ─────────────────────────────────────────
# Target: Xtensa ESP32-S3 (bare-metal, no OS)
# Toolchain: espup / espressif Rust fork

[build]
target = "xtensa-esp32s3-none-elf"

[target.xtensa-esp32s3-none-elf]
rustflags = [
    # Link script dari esp-hal (memetakan flash, IRAM, DRAM, dll.)
    "-C", "link-arg=-Tlinkall.x",
]

[unstable]
# Kompilasi core std library untuk target bare-metal
build-std = ["core"]
